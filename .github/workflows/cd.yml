name: CD Pipeline

on:
  push:
    branches: [*]

jobs:
  deploy:
    name: Build · Push · Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/logmein-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/logmein-backend:${{ github.sha }}

      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/logmein-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/logmein-frontend:${{ github.sha }}

      - name: Deploy to Docker Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_MANAGER_IP }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker stack deploy \
              -c /opt/logmein/docker-stack.yml \
              --with-registry-auth \
              logmein
            docker service ls
